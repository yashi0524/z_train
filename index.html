<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="color-scheme" content="light"/>
  <title>通風管逃脫 v4.7</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="assets_v2.4.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      background:#1a1a2e;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;
      font-family:'Courier New',monospace;
      touch-action:none;overflow:hidden;
      user-select:none;-webkit-user-select:none;
    }

    /* ── Mode picker overlay (shown before any game starts) ── */
    #mode-picker{
      position:fixed;inset:0;
      background:#1a1a2e;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:18px;z-index:999;
      padding:24px;
    }
    #mode-picker h1{color:#50c878;font-size:22px;letter-spacing:.1em;text-align:center;}
    #mode-picker p{color:#888;font-size:13px;text-align:center;max-width:340px;line-height:1.6;}
    .picker-section{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:380px;}
    .picker-label{color:#aaa;font-size:11px;letter-spacing:.15em;text-transform:uppercase;}
    .picker-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .pick-btn{
      padding:10px 20px;border:none;border-radius:8px;
      font-family:'Courier New',monospace;font-size:14px;
      cursor:pointer;color:#fff;
      box-shadow:0 3px 10px rgba(0,0,0,.4);
      transition:transform .1s,background .15s;
      min-width:140px;text-align:center;
    }
    .pick-btn:active{transform:scale(.93);}
    .pick-btn.res  {background:#2471a3;}
    .pick-btn.res:hover{background:#2e86c1;}
    .pick-btn.res.sel{background:#1a5276;outline:3px solid #50c878;}
    .pick-btn.kb   {background:#2471a3;}
    .pick-btn.kb:hover{background:#2e86c1;}
    .pick-btn.mob  {background:#27ae60;}
    .pick-btn.mob:hover{background:#2ecc71;}
    .pick-btn.go   {background:#8e44ad;font-size:16px;}
    .pick-btn.go:hover{background:#9b59b6;}
    .pick-btn.go:disabled{background:#555;cursor:default;}
    .pick-btn.reset{background:#c0392b;}
    .pick-btn.reset:hover{background:#e74c3c;}
    .pick-divider{width:100%;max-width:380px;border:none;border-top:1px solid #333;}

    /* ── Outer shell: sized by JS to match chosen resolution ── */
    #shell{
      position:relative;
      overflow:hidden;  /* clip iso-shell overflow cleanly */
    }

    /* ── Phaser canvas wrapper: scaleY for oblique look ── */
    #iso-shell{
      position:absolute;top:0;left:0;
      transform:scaleY(0.6);
      transform-origin:top left;
      z-index:1;
    }
    #iso-shell canvas{display:block;touch-action:none;}

    /* fog canvas */
    #fog-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:4;}

    /* ── Info panel: horizontal bar at bottom for both layouts ── */
    #info-panel{
      position:absolute;left:0;bottom:0;
      background:#0d0d1a;border-top:1px solid #333;
      z-index:8;
      display:flex;flex-direction:row;align-items:stretch;
      overflow:hidden;
    }
    body.resA #info-panel{width:800px;height:160px;}
    body.resB #info-panel{width:400px;height:160px;top:480px;bottom:auto;}

    /* ── Top bar: floats over game, centred ── */
    #top-bar{
      position:absolute;top:6px;left:50%;transform:translateX(-50%);
      z-index:30;
      display:flex;flex-direction:row;align-items:center;gap:10px;
      background:rgba(10,10,20,0.72);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px;
      padding:5px 14px;
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      white-space:nowrap;
    }
    #reset-btn{
      background:#c0392b;color:#fff;border:none;border-radius:6px;
      padding:4px 10px;font-family:'Courier New',monospace;font-size:11px;
      cursor:pointer;flex-shrink:0;
    }
    #reset-btn:hover{background:#e74c3c;}
    #clock-box{
      display:flex;flex-direction:row;align-items:center;gap:6px;
    }
    #clock-phase{font-size:9px;letter-spacing:.08em;color:#777;}
    #clock-time{font-size:18px;font-weight:bold;color:#aaa;letter-spacing:.04em;line-height:1;}
    #zombie-count{font-size:11px;color:#7dab6e;}
    #clock-box.red   #clock-phase,#clock-box.red   #clock-time{color:#e63946;}
    #clock-box.green #clock-phase,#clock-box.green #clock-time{color:#50c878;}
    #clock-box.red  {background:transparent;}
    #clock-box.green{background:transparent;}
    #status-msg{font-size:10px;color:#aaa;}
    #status-msg.hiding{color:#7ec8e3;}

    /* LEFT zone of info panel: vpad placeholder (blank when no vpad) */
    #info-left{
      display:flex;align-items:flex-start;justify-content:center;
      position:relative;flex-shrink:0;
    }
    body.resA #info-left{width:160px;}
    body.resB #info-left{width:130px;}

    /* CENTRE zone: minimap */
    #minimap-wrap{
      display:flex;align-items:center;justify-content:center;
      border-right:1px solid #333;
      flex:1 1 auto;
      overflow:hidden;
    }
    /* minimap = 1/3 of info panel width, explicit size */
    body.resA #minimap-wrap{ flex:0 0 267px;width:267px;padding:0; }
    body.resB #minimap-wrap{ flex:0 0 133px;width:133px;padding:0; }
    #minimap-canvas{
      display:block;
      border:1.5px solid rgba(255,255,255,0.25);
      border-radius:4px;
      /* width/height set by JS; narrower than container so flex can centre */
    }

    /* RIGHT zone: 2×2 grid (items top, vbtns bottom) */
    #info-right{
      display:flex;flex-direction:column;align-items:flex-end;
      justify-content:flex-start;gap:6px;
      padding:4px 10px 4px;flex-shrink:0;overflow:hidden;
    }

    /* Item slots */
    #item-hud{
      display:flex;flex-direction:row;align-items:flex-start;gap:8px;flex-shrink:0;width:100%;
    }
    .slot-group{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
    .item-slot{
      width:56px;height:56px;border-radius:14px;
      background:rgba(255,255,255,.07);
      border:2px solid rgba(255,255,255,.22);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;cursor:default;position:relative;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    .item-slot.active-btn{cursor:pointer;pointer-events:auto;touch-action:manipulation;}
    .item-slot.active-btn:active{background:rgba(80,100,180,.6);transform:scale(.9);}
    .item-slot.has-item{border-color:rgba(255,220,80,.6);background:rgba(255,220,80,.08);}
    .item-slot.empty{opacity:.3;}
    .item-slot .badge{
      position:absolute;bottom:-4px;right:-4px;
      background:#e63946;color:#fff;font-size:9px;
      border-radius:50%;width:16px;height:16px;
      display:flex;align-items:center;justify-content:center;
      font-family:monospace;font-weight:bold;border:1px solid #fff;
    }
    .item-label{font-size:10px;color:rgba(255,255,255,.5);text-align:center;margin-top:2px;}

    /* Virtual action buttons: beside item slots, mob-mode only */
    #vbtn-wrap{
      display:none;flex-direction:row;align-items:flex-start;gap:8px;pointer-events:none;
      flex-shrink:0;width:100%;
    }
    body.mob-mode #vbtn-wrap{display:flex;pointer-events:auto;}

    /* Virtual joystick: inside info-left, mob-mode only */
    #vpad-wrap{
      display:none;pointer-events:none;
    }
    body.mob-mode #vpad-wrap{display:flex;align-items:flex-start;justify-content:center;pointer-events:auto;padding-top:2px;}

    #vpad-canvas{display:block;touch-action:none;}
    .vbtn-row{display:flex;gap:6px;justify-content:flex-end;pointer-events:none;}
        .vbtn{
      width:56px;height:56px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-size:24px;cursor:pointer;pointer-events:auto;
      border:2px solid rgba(255,255,255,.35);
      background:rgba(30,30,60,.85);
      box-shadow:0 2px 8px rgba(0,0,0,.5);
      touch-action:none;transition:transform .08s,background .08s;
      flex-direction:column;gap:1px;
    }
    .vbtn:active,.vbtn.pressed{background:rgba(70,90,200,.9);transform:scale(.88);}
    #vbtn-jump{border-color:rgba(80,200,255,.6);background:rgba(20,40,80,.85);}
    #vbtn-hide{border-color:rgba(255,220,60,.6);background:rgba(60,50,10,.85);}


    /* ── Reset button (always visible, top of shell) ── */


    /* hint text */
    #hint-text{
      position:absolute;
      font-size:11px;color:#fff;
      text-shadow:0 1px 3px #000;
      pointer-events:none;z-index:12;
      text-align:center;
      left:0;width:100%;
      top:44px;   /* just below the top-bar pill */
    }
  </style>

  <!--
  ═══════════════════════════════════════════════

    - 直式改為 400×640 (遊戲區 480px + 訊息欄 160px)

  v4.6  小地圖放大 + 資訊欄緊貼 + 圓弧方框

    - resB gameH 修正為 1000 (視覺高度 600px = 1000×0.6)
    - 資訊欄緊貼遊戲區底部 (top=320/600px)
    - 所有道具/虛擬按鈕改為圓弧方框 (border-radius:14px)

  v4.5  小修正
    - 重置鍵改用文字
    - 小地圖置中
    - 虛擬按鈕放大 62px，置於右下角
    - 選擇模式畫面顯示版本號

  v4.4  頂端訊息列 + 資訊欄簡化

    - 資訊欄：左(搖桿或留白) / 中(小地圖) / 右(道具+按鈕)

  v4.3  資訊欄佈局重構
    - 重置鍵移入資訊欄左側，右方顯示時鐘+殭屍數
    - 資訊欄三欄：左(重置+時鐘) / 中(小地圖) / 右(道具+虛擬按鈕)
    - 虛擬方向鍵置於資訊欄左下角
    - 虛擬動作按鈕與道具圖示並列在右欄

  v4.2  直向小地圖修正
    - initMinimap 加入 canvas CSS size 設定
    - resB info panel 各子元素加 flex:0 0 固定寬度
    - resA 同步改為 flex basis 確保不被壓縮

  v4.1  橫向佈局修正 + 直向小地圖修正
    - 模式A: Phaser canvas 800×534，視覺地圖 800×320
    - 模式A資訊欄: 800×160 橫向排列，置於視覺地圖下方
    - 模式B: 修正 flex-wrap 導致小地圖消失，改 nowrap
    - 虛擬控制器位置隨資訊欄高度更新

  v4.0  雙解析度佈局 + 全面重構
    - 選模式畫面：選解析度 A(800×480) 或 B(400×800)
    - 模式 A：遊戲區 640×480，右側 160px 資訊欄
    - 模式 B：遊戲區 400×600，底部 200px 資訊欄
    - 資訊欄內含：時鐘、殭屍數、小地圖、道具欄
    - 鑰匙圖示不可點（顯示用）；手槍圖示=射擊按鈕
    - 手機模式：虛擬搖桿 + 跳躍/躲藏按鈕
    - 重置鍵回到模式選擇畫面

  v3.x  基礎遊戲 + 觸控支援
  ═══════════════════════════════════════════════
  -->

<body>

<!-- ── Mode picker ── -->
<div id="mode-picker">
  <h1>🐱 通風管逃脫</h1>
  <div style="color:#555;font-size:11px;letter-spacing:.1em;margin-top:-10px;">v4.7</div>
  <p>找到 🔑 鑰匙 → 抵達 EXIT 出口逃脫<br>躲入櫃子最多 5 秒 · 跳躍可閃過殭屍</p>

  <hr class="pick-divider"/>

  <div class="picker-section">
    <div class="picker-label">📐 選擇解析度</div>
    <div class="picker-row">
      <button class="pick-btn res" id="btn-resA" onclick="selectRes('A')">
        A — 800×480<br><small style="font-size:11px;opacity:.7">橫式 / iPad橫向</small>
      </button>
      <button class="pick-btn res" id="btn-resB" onclick="selectRes('B')">

    </div>
  </div>
</div>

<!-- ── Game shell (hidden until launched) ── -->
<div id="shell" style="display:none;">
  <div id="iso-shell"><div id="game-container"></div></div>
  <canvas id="fog-canvas"></canvas>

  <!-- Top bar: reset + clock + status, floats over game centred -->
  <div id="top-bar">
    <button id="reset-btn" onclick="resetGame()">重置</button>
    <div id="clock-box" class="grey">
      <div id="clock-phase">待機中</div>
      <div id="clock-time">00:05</div>
    </div>
    <div id="zombie-count">🧟×1</div>

  </div>

  <!-- Hint text -->
  <div id="hint-text"></div>

  <!-- Info panel: bottom bar -->
  <div id="info-panel">

    <!-- LEFT: vpad placeholder (blank in kb-mode) -->
    <div id="info-left">
      <div id="vpad-wrap"><canvas id="vpad-canvas" width="120" height="120"></canvas></div>
    </div>

    <!-- CENTRE: minimap -->
    <div id="minimap-wrap"><canvas id="minimap-canvas"></canvas></div>

    <!-- RIGHT: item slots + action buttons -->
    <div id="info-right">
      <div id="item-hud">
        <div class="slot-group">
          <div class="item-slot empty" id="slot-gun">🔫</div>
          <div class="item-label">手槍</div>
        </div>
        <div class="slot-group">
          <div class="item-slot empty" id="slot-key">🔑</div>
          <div class="item-label">鑰匙</div>
        </div>
      </div>
      <!-- Virtual action buttons (mob-mode only, beside item slots) -->
      <div id="vbtn-wrap">
        <div class="slot-group">
          <button class="vbtn" id="vbtn-jump">⬆️</button>

          <div class="item-label">躲</div>
        </div>
      </div>
    </div>

  </div><!-- end info-panel -->
</div>

<script>
// ═══════════════════════════════════════════════
// Layout configurations
// ═══════════════════════════════════════════════
const LAYOUTS={
  // A: total 800×480. Phaser 800×534 (visual 320px). info bar 800×160. 320+160=480 ✓
  A:{ totalW:800, totalH:480, gameW:800, gameH:534,  infoW:800, infoH:160, mmW:220, mmH:140, resB:false },
  // B: total 400×640. Phaser 400×800 (visual 480px). info bar 400×160. 480+160=640 ✓
  B:{ totalW:400, totalH:640, gameW:400, gameH:800,  infoW:400, infoH:160, mmW:105, mmH:140, resB:true }
};

// ── Current layout (set by selectRes) ──
let LAY=null;
let VIEW_W=640, VIEW_H=480;  // Phaser canvas size (game area)

// ── ISO scale ──
const ISO_SCALE=0.6;

// ── Game constants ──
const MAP_W=1600, MAP_H=1120;
const SCROLL_MARGIN=180;
const PLAYER_SPEED=220, ENEMY_SPEED=110;
const VISION_RADIUS=200;
const CABINET_RADIUS=22;
const FIRST_SAFE=5, SAFE_DURATION=30, HUNT_DURATION=15, COUNTDOWN_SECS=5;
const CABINET_HIDE_MAX=5;
const MAX_TRAIN_CARS=5;
const TILE=40;
const TRAIN_X=10, TRAIN_Y=10;
const CAR_W=108, CAR_H=52, CAR_GAP=4, LOCO_W=62;
function doorX(i){return TRAIN_X+8+i*(CAR_W+CAR_GAP)+CAR_W-22;}
const DOOR_Y=TRAIN_Y+10;

// ── Fog canvases (resized on launch) ──
const fogCanvas=document.getElementById('fog-canvas');
const fogCtx=fogCanvas.getContext('2d');
const exploredCanvas=document.createElement('canvas');
const exploredCtx=exploredCanvas.getContext('2d');
const dimCanvas=document.createElement('canvas');
const dimCtx=dimCanvas.getContext('2d');
let _camX=0, _camY=0;

function fogY(wy){return wy*ISO_SCALE;}
function fogCamY(){return _camY*ISO_SCALE;}

function initFogCanvases(){
  fogCanvas.width=VIEW_W; fogCanvas.height=VIEW_H;
  exploredCanvas.width=MAP_W; exploredCanvas.height=MAP_H*ISO_SCALE;
  exploredCtx.fillStyle='#000'; exploredCtx.fillRect(0,0,MAP_W,MAP_H*ISO_SCALE);
  dimCanvas.width=VIEW_W; dimCanvas.height=VIEW_H;
  fogCtx.fillStyle='#000'; fogCtx.fillRect(0,0,VIEW_W,VIEW_H);
}
function resetFog(){
  exploredCtx.fillStyle='#000'; exploredCtx.fillRect(0,0,MAP_W,MAP_H*ISO_SCALE);
  dimCtx.clearRect(0,0,VIEW_W,VIEW_H);
  fogCtx.fillStyle='#000'; fogCtx.fillRect(0,0,VIEW_W,VIEW_H);
}

function paintFog(px,py,vpts){
  const fcamY=fogCamY();
  if(vpts&&vpts.length>=3){
    exploredCtx.save(); exploredCtx.fillStyle='#fff';
    exploredCtx.beginPath();
    exploredCtx.moveTo(vpts[0].x,fogY(vpts[0].y));
    for(let i=1;i<vpts.length;i++) exploredCtx.lineTo(vpts[i].x,fogY(vpts[i].y));
    exploredCtx.closePath(); exploredCtx.fill(); exploredCtx.restore();
  }
  fogCtx.globalAlpha=1; fogCtx.fillStyle='#000';
  fogCtx.fillRect(0,0,VIEW_W,VIEW_H);
  fogCtx.save();
  fogCtx.globalCompositeOperation='destination-out';
  fogCtx.drawImage(exploredCanvas,_camX,fcamY,VIEW_W,VIEW_H,0,0,VIEW_W,VIEW_H);
  fogCtx.restore();
  if(vpts&&vpts.length>=3){
    dimCtx.clearRect(0,0,VIEW_W,VIEW_H);
    dimCtx.drawImage(exploredCanvas,_camX,fcamY,VIEW_W,VIEW_H,0,0,VIEW_W,VIEW_H);
    dimCtx.save(); dimCtx.globalCompositeOperation='source-in';
    dimCtx.fillStyle='rgba(0,0,0,0.72)'; dimCtx.fillRect(0,0,VIEW_W,VIEW_H); dimCtx.restore();
    dimCtx.save(); dimCtx.globalCompositeOperation='destination-out';
    dimCtx.beginPath();
    dimCtx.moveTo(vpts[0].x-_camX,fogY(vpts[0].y)-fcamY);
    for(let i=1;i<vpts.length;i++) dimCtx.lineTo(vpts[i].x-_camX,fogY(vpts[i].y)-fcamY);
    dimCtx.closePath(); dimCtx.fill(); dimCtx.restore();
    fogCtx.drawImage(dimCanvas,0,0);
    const fpx=px-_camX, fpy=fogY(py)-fcamY;
    const gr=fogCtx.createRadialGradient(fpx,fpy,VISION_RADIUS*ISO_SCALE*.8,fpx,fpy,VISION_RADIUS*ISO_SCALE*1.25);
    gr.addColorStop(0,'rgba(0,0,0,0)'); gr.addColorStop(1,'rgba(0,0,0,0.4)');
    fogCtx.fillStyle=gr; fogCtx.fillRect(0,0,VIEW_W,VIEW_H);
  }
}

// ── Minimap ──────────────────────────────────
const mmCanvas=document.getElementById('minimap-canvas');
const mmCtx=mmCanvas.getContext('2d');
let _mmLevel=null;
let MM_W=140, MM_H=98;
let MM_SX=MM_W/MAP_W, MM_SY=MM_H/MAP_H;

function initMinimap(){
  MM_W=LAY.mmW; MM_H=LAY.mmH;
  MM_SX=MM_W/MAP_W; MM_SY=MM_H/MAP_H;
  // Set both canvas buffer size AND CSS display size
  mmCanvas.width=MM_W; mmCanvas.height=MM_H;
  mmCanvas.style.width=MM_W+'px';
  mmCanvas.style.height=MM_H+'px';
  mmCanvas.style.display='block';
  mmCanvas.style.flexShrink='0';
}

function paintMinimap(px,py){
  if(!_mmLevel) return;
  const {walls,pillars,cabinets,exit,key,keyCollected,exitLocked}=_mmLevel;
  mmCtx.clearRect(0,0,MM_W,MM_H);
  mmCtx.fillStyle='rgba(20,20,35,0.92)'; mmCtx.fillRect(0,0,MM_W,MM_H);
  mmCtx.save(); mmCtx.globalAlpha=0.28;
  mmCtx.drawImage(exploredCanvas,0,0,MAP_W,MAP_H*ISO_SCALE,0,0,MM_W,MM_H);
  mmCtx.restore();
  mmCtx.fillStyle='rgba(136,153,170,0.85)';
  walls.forEach(w=>mmCtx.fillRect(w.x*MM_SX,w.y*MM_SY,Math.max(1,w.w*MM_SX),Math.max(1,w.h*MM_SY)));
  pillars.forEach(p=>mmCtx.fillRect((p.x-p.s)*MM_SX,(p.y-p.s)*MM_SY,p.s*2*MM_SX,p.s*2*MM_SY));
  mmCtx.fillStyle='rgba(160,121,42,0.7)';
  cabinets.forEach(c=>mmCtx.fillRect((c.x-5)*MM_SX,(c.y-5)*MM_SY,10*MM_SX,10*MM_SY));
  if(!keyCollected){mmCtx.fillStyle='#FFD700';mmCtx.beginPath();mmCtx.arc(key.x*MM_SX,key.y*MM_SY,2.5,0,Math.PI*2);mmCtx.fill();}
  mmCtx.fillStyle=exitLocked?'#888':'#00ff88';
  mmCtx.fillRect((exit.x-8)*MM_SX,(exit.y-8)*MM_SY,16*MM_SX,16*MM_SY);
  mmCtx.fillStyle='#50c878';
  mmCtx.beginPath();mmCtx.arc(px*MM_SX,py*MM_SY,3.5,0,Math.PI*2);mmCtx.fill();
  mmCtx.strokeStyle='#fff';mmCtx.lineWidth=1;mmCtx.stroke();
  mmCtx.strokeStyle='rgba(255,255,255,0.2)';mmCtx.lineWidth=1;
  mmCtx.strokeRect(_camX*MM_SX,_camY*MM_SY,VIEW_W*MM_SX,VIEW_H*MM_SY);
}

// ── Ray-cast ─────────────────────────────────
function buildSegs(walls,pillars){
  const s=[];
  function r(x,y,w,h){s.push([x,y,x+w,y],[x+w,y,x+w,y+h],[x+w,y+h,x,y+h],[x,y+h,x,y]);}
  walls.forEach(w=>r(w.x,w.y,w.w,w.h));
  pillars.forEach(p=>r(p.x-p.s,p.y-p.s,p.s*2,p.s*2));
  const E=1; r(-E,-E,MAP_W+E*2,MAP_H+E*2); return s;
}
function castVision(px,py,segs,rad){
  const angles=[];
  segs.forEach(([x1,y1,x2,y2])=>{
    [Math.atan2(y1-py,x1-px),Math.atan2(y2-py,x2-px)].forEach(a=>angles.push(a-.0001,a,a+.0001));
  });
  const pts=[];
  angles.forEach(angle=>{
    const dx=Math.cos(angle),dy=Math.sin(angle);let minT=rad;
    segs.forEach(([x1,y1,x2,y2])=>{
      const ex=x2-x1,ey=y2-y1,d=dx*ey-dy*ex;if(Math.abs(d)<1e-8)return;
      const t=((x1-px)*ey-(y1-py)*ex)/d,u=((x1-px)*dy-(y1-py)*dx)/d;
      if(t>=0&&t<minT&&u>=0&&u<=1)minT=t;
    });
    pts.push({angle,x:px+dx*minT,y:py+dy*minT});
  });
  pts.sort((a,b)=>a.angle-b.angle);return pts;
}

// ── Level generator ──────────────────────────
function generateLevel(){
  const margin=3,cols=Math.floor(MAP_W/TILE),rows=Math.floor(MAP_H/TILE);
  const walls=[],occ=new Set();
  function addW(tx,ty,tw,th){
    walls.push({x:tx*TILE,y:ty*TILE,w:tw*TILE,h:th*TILE});
    for(let dx=0;dx<tw;dx++)for(let dy=0;dy<th;dy++)occ.add(`${tx+dx},${ty+dy}`);
  }
  [{cx:10,cy:7},{cx:28,cy:7},{cx:10,cy:18},{cx:28,cy:18},{cx:19,cy:12}].forEach(({cx,cy})=>{
    const rw=7,rh=5,rx=cx-3,ry=cy-2;
    if(rx<2||ry<3||rx+rw>cols-2||ry+rh>rows-2)return;
    addW(rx,ry,3,1);addW(rx+4,ry,3,1);addW(rx,ry+rh-1,3,1);addW(rx+4,ry+rh-1,3,1);
    addW(rx,ry,1,2);addW(rx,ry+3,1,2);addW(rx+rw-1,ry,1,2);addW(rx+rw-1,ry+3,1,2);
  });
  const ne=14+Math.floor(Math.random()*8);
  for(let a=0;a<ne*12&&walls.length<ne+40;a++){
    const h=Math.random()>.5,len=2+Math.floor(Math.random()*4);
    const tx=margin+Math.floor(Math.random()*(cols-2*margin-len));
    const ty=3+Math.floor(Math.random()*(rows-5));
    let ok=true;
    for(let i=0;i<len;i++){if(occ.has(h?`${tx+i},${ty}`:`${tx},${ty+i}`)){ok=false;break;}}
    if(!ok)continue;
    if(h)addW(tx,ty,len,1);else addW(tx,ty,1,len);
  }
  const pillars=[];
  for(let a=0;a<200&&pillars.length<10;a++){
    const tx=3+Math.floor(Math.random()*(cols-6)),ty=3+Math.floor(Math.random()*(rows-6));
    if(!occ.has(`${tx},${ty}`)){occ.add(`${tx},${ty}`);pillars.push({x:tx*TILE+20,y:ty*TILE+20,s:12});}
  }
  const cabinets=[];
  for(let a=0;a<300&&cabinets.length<7;a++){
    const tx=2+Math.floor(Math.random()*(cols-4)),ty=3+Math.floor(Math.random()*(rows-5));
    if(!occ.has(`${tx},${ty}`)){occ.add(`${tx},${ty}`);cabinets.push({x:tx*TILE+20,y:ty*TILE+20});}
  }
  const ep=Math.floor(Math.random()*4);let exit;
  if(ep===0)exit={x:(8+Math.floor(Math.random()*(cols-12)))*TILE,y:TILE};
  else if(ep===1)exit={x:(2+Math.floor(Math.random()*(cols-4)))*TILE,y:(rows-2)*TILE};
  else if(ep===2)exit={x:TILE,y:(4+Math.floor(Math.random()*(rows-6)))*TILE};
  else exit={x:(cols-2)*TILE,y:(2+Math.floor(Math.random()*(rows-4)))*TILE};
  let key=null;
  for(let a=0;a<300&&!key;a++){
    const tx=2+Math.floor(Math.random()*(cols-4)),ty=3+Math.floor(Math.random()*(rows-5));
    const kx=tx*TILE+20,ky=ty*TILE+20;
    if(!occ.has(`${tx},${ty}`)&&Math.hypot(kx-exit.x,ky-exit.y)>350&&Math.hypot(kx-MAP_W/2,ky-MAP_H/2)>180){
      occ.add(`${tx},${ty}`);key={x:kx,y:ky};
    }
  }
  if(!key)key={x:400,y:900};
  return {walls,pillars,cabinets,exit,key,keyCollected:false,exitLocked:true};
}

    lv.pillars.forEach(p=>{
      const sz=p.s*2;
      wg.fillStyle(0x3a4455,1);wg.fillRect(p.x-p.s,p.y+p.s,sz,SIDE);
      wg.fillStyle(0x667799,1);wg.fillRect(p.x-p.s,p.y-p.s,sz,sz);

    // Gun

    this._gunSpr=this.add.image(gc.x,gc.y-26,'gun_tex').setDisplaySize(28,23).setDepth(4).setAlpha(0.9);
    this.tweens.add({targets:this._gunSpr,y:gc.y-30,yoyo:true,repeat:-1,duration:900,ease:'Sine.easeInOut'});
    this._gunZone=new Phaser.Geom.Circle(gc.x,gc.y,CABINET_RADIUS+32);

    // Key
    this._hasKey=false;
    this._keySpr=this.add.image(lv.key.x,lv.key.y,'key_tex').setDisplaySize(26,43).setDepth(3);
    this.tweens.add({targets:this._keySpr,y:lv.key.y-6,yoyo:true,repeat:-1,duration:700,ease:'Sine.easeInOut'});

    this._exitSpr=this.add.image(ex.x,ex.y,'exit_locked').setDisplaySize(44,73).setDepth(3);
    this.tweens.add({targets:this._exitSpr,scaleX:1.12,scaleY:1.12,yoyo:true,repeat:-1,duration:700});
    this._exitZone=new Phaser.Geom.Circle(ex.x,ex.y,28);

    // Player
    this.player=this.physics.add.sprite(MAP_W/2,MAP_H/2,'player');
    this.player.setDisplaySize(36,60).setCollideWorldBounds(true).setDepth(5);
    this.player.body.setSize(20,20);this.player.body.setOffset(14,14);
    this.player.body.setMaxVelocity(PLAYER_SPEED,PLAYER_SPEED);
    this._jumpZ=0;this._jumpT=0;this._jumping=false;
    this._jumpGhost=null;
    this._shadow=this.add.graphics().setDepth(4);

    // Enemies
    this.enemies=this.physics.add.group();
    this._zCount=1;this._spawnZ(0);

    // HUD text (screen-fixed)
    this._hideBar=this.add.graphics().setDepth(20).setScrollFactor(0);
    this._ejectTxt=this.add.text(0,0,'',{fontSize:'18px',fontFamily:'Courier New',color:'#e63946',stroke:'#fff',strokeThickness:4}).setOrigin(0.5).setDepth(20).setScrollFactor(0);

    // Overlay
    this._ov=document.createElement('div');
    this._ov.id='game-overlay';
    this._ov.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:60;';
    document.getElementById('shell').appendChild(this._ov);

    // Input
    this.keys=this.input.keyboard.addKeys({
      up:Phaser.Input.Keyboard.KeyCodes.W, down:Phaser.Input.Keyboard.KeyCodes.S,
      left:Phaser.Input.Keyboard.KeyCodes.A, right:Phaser.Input.Keyboard.KeyCodes.D,
      space:Phaser.Input.Keyboard.KeyCodes.SPACE, f:Phaser.Input.Keyboard.KeyCodes.F,
    });
    this._spWas=false;this._fWas=false;
    this.input.on('pointerdown',(p)=>{ if(p.leftButtonDown())this._shootAt(p.x+_camX,p.y+_camY); });

    // Gun slot tap (shoot via item HUD)
    const gunSlot=document.getElementById('slot-gun');
    if(gunSlot){
      gunSlot.onclick=()=>{ if(this._hasGun&&!this._gunUsed){ const px=this.player.x,py=this.player.y; this._shootAt(px+100,py); } };
    }

    // Colliders
    this.physics.add.collider(this.player,this.walls);
    this.physics.add.collider(this.enemies,this.walls);
    this._zOvlp=this.physics.add.overlap(this.player,this.enemies,this._caught_cb,null,this);

    // State
    this._state='waiting';this._pt=0;this._firstSafe=true;
    this._startTime=null;this._gameTime=0;
    this._hiding=false;this._hideT=0;this._nearCab=null;
    this._caught=false;this._won=false;
    this._keyLbl=null;this._gunLbl=null;this._vbShootWas=false;

    this._showOv('🐱','請選擇開始方式<br><br>找到 🔑 鑰匙 → 抵達 EXIT 即勝利');
    this._hudUpdate();
  }

  _camUpdate(){
    const px=this.player.x,py=this.player.y,cam=this.cameras.main;
    let cx=cam.scrollX,cy=cam.scrollY;
    const sx=px-cx,sy=py-cy;
    if(sx<SCROLL_MARGIN)cx=px-SCROLL_MARGIN;
    if(sx>VIEW_W-SCROLL_MARGIN)cx=px-VIEW_W+SCROLL_MARGIN;
    if(sy<SCROLL_MARGIN)cy=py-SCROLL_MARGIN;
    if(sy>VIEW_H-SCROLL_MARGIN)cy=py-VIEW_H+SCROLL_MARGIN;
    cx=Math.max(0,Math.min(MAP_W-VIEW_W,cx));
    cy=Math.max(0,Math.min(MAP_H-VIEW_H,cy));
    cam.setScroll(cx,cy);_camX=cx;_camY=cy;
  }

  _showOv(e,m){
    this._ov.innerHTML=`<div style="background:rgba(0,0,0,0.82);border-radius:14px;padding:22px 32px;text-align:center;color:#fff;font-family:'Courier New',monospace;max-width:320px;"><div style="font-size:50px;margin-bottom:8px;">${e}</div><div style="font-size:13px;line-height:1.8;">${m}</div></div>`;
  }
  _hideOv(){this._ov.innerHTML='';}

  _begin(){
    if(this._state!=='waiting')return;
    this._startTime=Date.now();
    this._enterSafe();
  }
  _enterSafe(){
    this._state='safe';this._pt=this._firstSafe?FIRST_SAFE:SAFE_DURATION;
    this._firstSafe=false;this._recallZ();this._hideOv();this._hudUpdate();
  }
  _enterPreHunt(){
    this._state='pre_hunt';this._pt=COUNTDOWN_SECS;
    if(this._numCars<MAX_TRAIN_CARS){
      this._numCars++;this._tg.clear();
      drawTrainGfx(this._tg,this._numCars,TRAIN_X,TRAIN_Y,CAR_W,CAR_H,CAR_GAP,LOCO_W);
    }
    this._zCount++;this._spawnZ(this._numCars-1);
    this.enemies.getChildren().forEach(z=>{z._ret=false;});
    this._hudUpdate();
  }
  _enterHunt(){this._state='hunt';this._pt=HUNT_DURATION;this._hideOv();this._hudUpdate();}

  _spawnZ(ci){
    const z=this.enemies.create(doorX(Math.min(ci,this._numCars-1)),DOOR_Y+20,'enemy');
    z.setDisplaySize(40,67).setCollideWorldBounds(true).setDepth(5);
    z.body.setSize(18,18);z.body.setOffset(15,15);
    z.body.setMaxVelocity(ENEMY_SPEED,ENEMY_SPEED);
    z._ret=false;z._ci=ci;return z;
  }
  _recallZ(){
    this.enemies.getChildren().forEach((z,i)=>{
      z._ret=true;z._hx=doorX(Math.min(z._ci||0,this._numCars-1));z._hy=DOOR_Y+20+i*4;
    });
  }

  _hudUpdate(){
    const te=document.getElementById('clock-time');
    const pe=document.getElementById('clock-phase');
    const ce=document.getElementById('zombie-count');
    const be=document.getElementById('clock-box');
    if(!te)return;
    ce.textContent='🧟 ×'+this._zCount;
    const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    const st=this._state;
    if(st==='waiting'){be.className='grey';pe.textContent='待機中';te.textContent='00:05';}
    else if(st==='safe'){be.className='green';pe.textContent='✓ 安全期';te.textContent=fmt(Math.max(0,Math.ceil(this._pt)));}
    else if(st==='pre_hunt'){be.className='red';pe.textContent='⚠ 即將追捕';te.textContent='準備！';}
    else if(st==='hunt'){be.className='red';pe.textContent='⚠ 追捕中';te.textContent=fmt(Math.max(0,Math.ceil(this._pt)));}
    if(_mmLevel){_mmLevel.exitLocked=this._exitLocked;_mmLevel.keyCollected=this._hasKey;}
  }
  _itemHUD(){
    const gs=document.getElementById('slot-gun');
    const ks=document.getElementById('slot-key');
    if(!gs||!ks)return;
    if(this._hasGun){
      gs.classList.remove('empty');gs.classList.add('has-item');
      if(_mobMode)gs.classList.add('active-btn');
      let b=gs.querySelector('.badge');
      if(!b){b=document.createElement('div');b.className='badge';gs.appendChild(b);}
      b.textContent=this._gunUsed?'0':'1';b.style.background=this._gunUsed?'#555':'#e63946';
    } else {gs.classList.add('empty');gs.classList.remove('has-item','active-btn');}
    if(this._hasKey){ks.classList.remove('empty');ks.classList.add('has-item');}
    else{ks.classList.add('empty');ks.classList.remove('has-item');}
  }

  _caught_cb(){
    if(this._hiding||this._caught||this._won||this._state!=='hunt')return;
    this._caught=true;this.physics.pause();
    this._showOv('😱','被抓了！<br><br><button onclick="resetGame()" style="margin-top:10px;padding:7px 18px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-family:\'Courier New\',monospace;font-size:14px;cursor:pointer;">🔄 重置</button>');
    this._ov.style.pointerEvents='auto';
  }
  _eject(){
    this._hiding=false;this._hideT=0;this.player.setAlpha(1);this._hideBar.clear();
    const sx=this.player.x-_camX,sy=this.player.y-_camY;
    this._ejectTxt.setText('彈出！').setPosition(sx,sy-40);
    this.time.delayedCall(800,()=>{if(this._ejectTxt)this._ejectTxt.setText('');});
    document.getElementById('status-msg').textContent='暴露中';
    document.getElementById('status-msg').className='';
  }

  _shootAt(wx,wy){
    if(!this._hasGun||this._gunUsed||this._hiding)return;
    this._gunUsed=true;this._itemHUD();
    const px=this.player.x,py=this.player.y;
    const ang=Math.atan2(wy-py,wx-px),spd=700,dist=900;
    const bul=this.add.graphics().setDepth(8);
    bul.fillStyle(0xffee33,1);bul.fillCircle(0,0,5);bul.x=px;bul.y=py;
    const fl=this.add.graphics().setDepth(9);
    fl.fillStyle(0xffffff,1);fl.fillCircle(px,py,11);
    this.time.delayedCall(55,()=>fl.destroy());
    this.tweens.add({targets:bul,x:px+Math.cos(ang)*dist,y:py+Math.sin(ang)*dist,duration:(dist/spd)*1000,
      onUpdate:()=>{
        this.enemies.getChildren().forEach(z=>{
          if(!z.active)return;
          if(Phaser.Math.Distance.Between(bul.x,bul.y,z.x,z.y)<22){
            z._ret=true;z._hx=doorX(Math.min(z._ci||0,this._numCars-1));z._hy=DOOR_Y+20;
            const h=this.add.text(z.x,z.y-18,'💥',{fontSize:'22px'}).setOrigin(0.5).setDepth(8);
            this.tweens.add({targets:h,y:z.y-50,alpha:0,duration:700,onComplete:()=>h.destroy()});
            if(bul.active)bul.destroy();
          }
        });
      },
      onComplete:()=>{if(bul.active)bul.destroy();}
    });
  }

  update(time,delta){
    if(this._caught||this._won)return;
    this._camUpdate();
    const px=this.player.x,py=this.player.y;
    const pts=castVision(px,py,this._segs,VISION_RADIUS);
    paintFog(px,py,pts);
    paintMinimap(px,py);

    if(this._state==='waiting')return;
    const dt=delta/1000;
    this._pt-=dt;this._hudUpdate();

    if(this._state==='safe'&&this._pt<=0){this._enterPreHunt();}
    else if(this._state==='pre_hunt'){
      const r=Math.ceil(Math.max(0,this._pt));
      this._showOv(`<span style="font-size:86px;color:#e63946;">${r}</span>`,'殭屍即將衝出！');
      if(this._pt<=0)this._enterHunt();
    } else if(this._state==='hunt'&&this._pt<=0){this._enterSafe();}

    const {up,down,left,right,space,f}=this.keys;
    const sx=px-_camX,sy=py-_camY;

    // Cabinet proximity
    let nc=null,nd=Infinity;
    this._cabs.forEach(c=>{
      const d=Phaser.Math.Distance.Between(px,py,c.x,c.y);
      if(d<CABINET_RADIUS+32&&d<nd){nd=d;nc=c;}
    });
    this._nearCab=nc;

    // Hide timer
    if(this._hiding){
      this._hideT+=dt;
      const pct=Math.max(0,1-this._hideT/CABINET_HIDE_MAX);
      this._hideBar.clear();
      this._hideBar.fillStyle(0x000000,.55);this._hideBar.fillRect(sx-22,sy-44,44,7);
      this._hideBar.fillStyle(pct>.4?0x50c878:0xe63946,1);this._hideBar.fillRect(sx-22,sy-44,44*pct,7);
      if(this._hideT>=CABINET_HIDE_MAX)this._eject();
    } else {this._hideBar.clear();}

    // Jump
    const spDown=space.isDown||_vbJump;
    if(spDown&&!this._spWas&&!this._hiding&&!this._jumping){
      this._jumping=true;this._jumpT=0;
      this.physics.world.removeCollider(this._zOvlp);
    }
    this._spWas=spDown;
    if(this._jumping){
      this._jumpT+=dt;const t=this._jumpT/0.42;
      if(t>=1){
        this._jumping=false;this._jumpZ=0;
        this.player.setDisplaySize(36,60);this._shadow.clear();
        this._zOvlp=this.physics.add.overlap(this.player,this.enemies,this._caught_cb,null,this);
      } else {
        this._jumpZ=Math.sin(t*Math.PI)*44;
        const sc=1+Math.sin(t*Math.PI)*.2;
        this.player.setDisplaySize(36*sc,60*sc);
        this._shadow.clear();
        const h2=Math.sin(t*Math.PI),sr=14*(1-h2*.5);
        this._shadow.fillStyle(0x000000,.2*(1-h2*.6));
        this._shadow.fillEllipse(px,py+10,sr*2,sr*.4);
      }
    } else {this._jumpZ=0;}

    if(this._jumping){
      if(!this._jumpGhost){
        this._jumpGhost=this.add.image(px,py,'player').setDisplaySize(36,60).setDepth(6);
        this.player.setAlpha(0);
      }
      const sc2=1+Math.sin((this._jumpT/0.42)*Math.PI)*.2;
      this._jumpGhost.setPosition(px,py-this._jumpZ).setDisplaySize(36*sc2,60*sc2);
      this._jumpGhost.setFlipX(this.player.flipX);
    } else {
      if(this._jumpGhost){this._jumpGhost.destroy();this._jumpGhost=null;}
      if(!this._hiding)this.player.setAlpha(1);
    }

    // Hide/F
    const fDown=f.isDown||_vbHide;
    if(fDown&&!this._fWas){
      if(this._nearCab&&!this._hiding&&!this._jumping){
        this._hiding=true;this._hideT=0;this.player.setAlpha(0.12);
        document.getElementById('status-msg').textContent='躲在櫃子裡';
        document.getElementById('status-msg').className='hiding';
      } else if(this._hiding){this._eject();}
    }
    this._fWas=fDown;

    // Movement
    if(!this._hiding){
      let vx=0,vy=0;
      if(left.isDown)vx=-PLAYER_SPEED;if(right.isDown)vx=PLAYER_SPEED;
      if(up.isDown)  vy=-PLAYER_SPEED;if(down.isDown) vy=PLAYER_SPEED;
      if(_vjActive){
        const dead=0.15;
        if(Math.abs(_vjX)>dead||Math.abs(_vjY)>dead){vx=_vjX*PLAYER_SPEED;vy=_vjY*PLAYER_SPEED;}
      }
      if(vx&&vy){vx*=0.707;vy*=0.707;}
      this.player.setVelocity(vx,vy);
      if(vx<0)this.player.setFlipX(true);else if(vx>0)this.player.setFlipX(false);
    } else {this.player.setVelocity(0,0);}

    // Item labels
    if(this._keyLbl)this._keyLbl.setPosition(sx+9,sy-24);
    if(this._gunLbl)this._gunLbl.setPosition(sx-9,sy-24);

    // Virtual shoot (nearest enemy)
    if(_vbShoot&&!this._vbShootWas){
      let tx=this.player.x+100,ty=this.player.y,minD=Infinity;
      this.enemies.getChildren().forEach(z=>{
        const d=Phaser.Math.Distance.Between(this.player.x,this.player.y,z.x,z.y);
        if(d<minD){minD=d;tx=z.x;ty=z.y;}
      });
      this._shootAt(tx,ty);
    }
    this._vbShootWas=_vbShoot;

    // Gun pickup
    if(!this._hasGun&&this._gunSpr&&this._gunSpr.active&&Phaser.Geom.Circle.Contains(this._gunZone,px,py)){
      this._hasGun=true;this._gunSpr.destroy();this._gunSpr=null;this._itemHUD();
      const gb=this.add.graphics().setDepth(25).setScrollFactor(0);
      gb.fillStyle(0x000000,.75);gb.fillRoundedRect(VIEW_W/2-140,VIEW_H/2-28,280,56,10);
      gb.lineStyle(2,0xaaa,.9);gb.strokeRoundedRect(VIEW_W/2-140,VIEW_H/2-28,280,56,10);
      const gm=this.add.text(VIEW_W/2,VIEW_H/2-0,'🔫 撿到手槍！',{fontSize:'18px',fontFamily:'Courier New',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(26).setScrollFactor(0);
      this.tweens.add({targets:[gm,gb],alpha:0,delay:1400,duration:600,onComplete:()=>{gm.destroy();gb.destroy();}});
      this._gunLbl=this.add.text(sx-9,sy-24,'🔫',{fontSize:'14px'}).setOrigin(0.5,1).setDepth(20).setScrollFactor(0);
    }

    // Key pickup
    if(!this._hasKey&&Phaser.Geom.Circle.Contains(this._keyZone,px,py)){
      this._hasKey=true;this._keySpr.destroy();
      this._exitLocked=false;this._exitSpr.setTexture('exit_open');
      this._hudUpdate();this._itemHUD();
      const bb=this.add.graphics().setDepth(25).setScrollFactor(0);
      bb.fillStyle(0x000000,.75);bb.fillRoundedRect(VIEW_W/2-150,VIEW_H/2-28,300,56,10);
      bb.lineStyle(2,0xFFD700,.9);bb.strokeRoundedRect(VIEW_W/2-150,VIEW_H/2-28,300,56,10);
      const bm=this.add.text(VIEW_W/2,VIEW_H/2,'🔑 取得鑰匙！出口已解鎖',{fontSize:'17px',fontFamily:'Courier New',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(26).setScrollFactor(0);
      this.tweens.add({targets:[bm,bb],alpha:0,delay:1400,duration:600,onComplete:()=>{bm.destroy();bb.destroy();}});
      this._keyLbl=this.add.text(sx+9,sy-24,'🔑',{fontSize:'14px'}).setOrigin(0.5,1).setDepth(20).setScrollFactor(0);
    }

    // Exit
    if(!this._exitLocked&&Phaser.Geom.Circle.Contains(this._exitZone,px,py)){
      this._won=true;this.physics.pause();
      const _elapsed=this._startTime?Math.floor((Date.now()-this._startTime)/1000):0;
      const _mm=String(Math.floor(_elapsed/60)).padStart(2,'0'),_ss=String(_elapsed%60).padStart(2,'0');
      this._showOv('🎉',`逃脫成功！<br><small style="color:#aaa">用時 ${_mm}:${_ss}</small><br><br><button onclick="resetGame()" style="margin-top:10px;padding:7px 18px;background:#27ae60;color:#fff;border:none;border-radius:8px;font-family:'Courier New',monospace;font-size:14px;cursor:pointer;">🔄 再玩</button>`);
      this._ov.style.pointerEvents='auto';
    }

    // Enemy AI
    this.enemies.getChildren().forEach(z=>{
      if(z._ret){
        const hx=z._hx||doorX(0),hy=z._hy||DOOR_Y+20;
        const d=Phaser.Math.Distance.Between(z.x,z.y,hx,hy);
        if(d>5){const a=Phaser.Math.Angle.Between(z.x,z.y,hx,hy);z.setVelocity(Math.cos(a)*ENEMY_SPEED*.8,Math.sin(a)*ENEMY_SPEED*.8);z.setFlipX(Math.cos(a)<0);}
        else{z.setVelocity(0,0);z.setPosition(hx,hy);}
      } else if(this._state==='hunt'){
        if(!this._hiding){const a=Phaser.Math.Angle.Between(z.x,z.y,px,py);z.setVelocity(Math.cos(a)*ENEMY_SPEED,Math.sin(a)*ENEMY_SPEED);z.setFlipX(Math.cos(a)<0);}
        else{z.setVelocity(z.body.velocity.x*.92,z.body.velocity.y*.92);}
      } else if(this._state==='pre_hunt'){z.setVelocity(z.body.velocity.x*.8,z.body.velocity.y*.8);}
      else{z.setVelocity(z.body.velocity.x*.9,z.body.velocity.y*.9);}
    });

    // Hints
    const hint=document.getElementById('hint-text');
    if(!hint)return;
    const atEx=Phaser.Geom.Circle.Contains(this._exitZone,px,py);
    const atGun=this._gunSpr&&this._gunSpr.active&&Phaser.Geom.Circle.Contains(this._gunZone,px,py);
    if(atEx&&this._exitLocked)hint.textContent='需要 🔑 才能開門！';
    else if(atGun&&!this._hasGun)hint.textContent='走近自動撿起手槍！';
    else if(this._nearCab&&!this._hiding)hint.textContent=_mobMode?'🚪 躲入櫃子（最多5秒）':'[F] 躲入櫃子（最多5秒）';
    else if(this._hiding)hint.textContent=_mobMode?'🚪 離開櫃子':'[F] 離開櫃子';
    else hint.textContent='';
  }
}

// ═══════════════════════════════════════════════
// Virtual input state
// ═══════════════════════════════════════════════
let _vjX=0,_vjY=0,_vjActive=false;
let _vbJump=false,_vbHide=false,_vbShoot=false;
let _mobMode=false;
let _selectedRes=null;
let game=null;

function _initVpad(){
  const old=document.getElementById('vpad-canvas');
  if(!old)return;
  const fresh=old.cloneNode(true);
  old.parentNode.replaceChild(fresh,old);
  const canvas=document.getElementById('vpad-canvas');
  const ctx=canvas.getContext('2d');
  const R=50,CX=65,CY=65;
  let stickX=CX,stickY=CY,active=false,pid=null;

  function draw(){
    ctx.clearRect(0,0,130,130);
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.strokeStyle=active?'rgba(160,200,255,0.8)':'rgba(160,200,255,0.35)';
    ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle=active?'rgba(80,120,200,0.25)':'rgba(60,90,160,0.12)';ctx.fill();
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy])=>{
      const ax=CX+dx*(R-12),ay=CY+dy*(R-12);
      ctx.beginPath();ctx.moveTo(ax+dy*6,ay-dx*6);ctx.lineTo(ax-dy*6,ay+dx*6);ctx.lineTo(ax+dx*8,ay+dy*8);
      ctx.closePath();ctx.fillStyle='rgba(180,210,255,0.4)';ctx.fill();
    });
    const kg=ctx.createRadialGradient(stickX-2,stickY-2,1,stickX,stickY,18);
    kg.addColorStop(0,'rgba(180,200,255,0.95)');kg.addColorStop(1,'rgba(60,90,200,0.75)');
    ctx.beginPath();ctx.arc(stickX,stickY,18,0,Math.PI*2);
    ctx.fillStyle=kg;ctx.fill();
    ctx.strokeStyle='rgba(200,220,255,0.6)';ctx.lineWidth=2;ctx.stroke();
  }
  function move(cx2,cy2){
    const rect=canvas.getBoundingClientRect();
    const scX=rect.width>0?canvas.width/rect.width:1,scY=rect.height>0?canvas.height/rect.height:1;
    const lx=(cx2-rect.left)*scX-CX,ly=(cy2-rect.top)*scY-CY;
    const dist=Math.sqrt(lx*lx+ly*ly),clamp=Math.min(dist,R-3);
    const nx=dist>0?lx/dist:0,ny=dist>0?ly/dist:0;
    stickX=CX+nx*clamp;stickY=CY+ny*clamp;
    _vjX=nx*(clamp/(R-3));_vjY=ny*(clamp/(R-3));_vjActive=true;draw();
  }
  function release(){active=false;pid=null;_vjX=0;_vjY=0;_vjActive=false;stickX=CX;stickY=CY;draw();}

  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(pid!==null)return;const t=e.changedTouches[0];pid=t.identifier;active=true;move(t.clientX,t.clientY);},{passive:false});
  canvas.addEventListener('touchmove', e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===pid){move(t.clientX,t.clientY);break;}},{passive:false});
  canvas.addEventListener('touchend',  e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===pid){release();break;}},{passive:false});
  canvas.addEventListener('mousedown',e=>{active=true;move(e.clientX,e.clientY);});
  if(window._vpadMM)window.removeEventListener('mousemove',window._vpadMM);
  if(window._vpadMU)window.removeEventListener('mouseup',window._vpadMU);
  window._vpadMM=e=>{if(active)move(e.clientX,e.clientY);};
  window._vpadMU=()=>{if(active)release();};
  window.addEventListener('mousemove',window._vpadMM);
  window.addEventListener('mouseup',  window._vpadMU);
  draw();
}

function _setupVBtn(id,setOn,setOff){
  const old=document.getElementById(id);if(!old)return;
  const el=old.cloneNode(true);old.parentNode.replaceChild(el,old);
  const on =e=>{e.preventDefault();el.classList.add('pressed');setOn();};
  const off=e=>{e.preventDefault();el.classList.remove('pressed');setOff();};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',  off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',  off);
  el.addEventListener('mouseleave',off);
}

// ── Mode picker ──────────────────────────────
function selectRes(res){
  _selectedRes=res;
  document.getElementById('btn-resA').classList.toggle('sel',res==='A');
  document.getElementById('btn-resB').classList.toggle('sel',res==='B');
  document.getElementById('btn-kb').disabled=false;
  document.getElementById('btn-mob').disabled=false;
}

function launch(inputMode){
  if(!_selectedRes)return;
  LAY=LAYOUTS[_selectedRes];
  VIEW_W=LAY.gameW; VIEW_H=LAY.gameH;

  // Apply body class
  document.body.classList.remove('resA','resB');
  document.body.classList.add('res'+_selectedRes);
  _mobMode=(inputMode==='mob');
  if(_mobMode) document.body.classList.add('mob-mode');
  else          document.body.classList.remove('mob-mode');

  // Size the shell and iso-shell
  const shell=document.getElementById('shell');
  shell.style.width =LAY.totalW+'px';
  shell.style.height=LAY.totalH+'px';
  const iso=document.getElementById('iso-shell');
  iso.style.width =VIEW_W+'px';
  iso.style.height=VIEW_H+'px';

  // Info panel position handled by CSS (resA/resB classes)
  // Minimap size
  initMinimap();

  // Hide picker, show shell
  document.getElementById('mode-picker').style.display='none';
  shell.style.display='block';

  // Init fog
  initFogCanvases();

  // Touch prevention on shell
  shell.addEventListener('touchstart',e=>{
    const t=e.target;
    if(!(t.tagName==='BUTTON'||t.closest('button')||t.closest('.item-slot')))
      e.preventDefault();
  },{passive:false,capture:false});
  shell.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

  // Create Phaser
  const config={
    type:Phaser.CANVAS,
    width:VIEW_W,height:VIEW_H,
    parent:'game-container',
    backgroundColor:'#edf2ed',
    physics:{default:'arcade',arcade:{gravity:{y:0},debug:false,fixedStep:true,fps:240,tileBias:32}},
    scene:GameScene,
  };
  game=new Phaser.Game(config);

  // Init mob controls after 2 frames
  if(_mobMode){
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      _initVpad();
      _setupVBtn('vbtn-jump',()=>_vbJump=true,()=>_vbJump=false);
      _setupVBtn('vbtn-hide',()=>_vbHide=true,()=>_vbHide=false);
      // vbtn-shoot removed: gun slot in item-hud is the shoot button
    }));
  }

  // Start game after scene ready
  setTimeout(()=>{
    const sc=game.scene.getScene('GameScene');
    if(sc&&sc._begin)sc._begin();
  },600);
}

function resetGame(){
  // Destroy Phaser
  if(game){game.destroy(true);game=null;}

  // Reset virtual input
  _vjX=0;_vjY=0;_vjActive=false;_vbJump=false;_vbHide=false;_vbShoot=false;
  _mobMode=false;_mmLevel=null;_camX=0;_camY=0;

  // Reset item HUD
  ['slot-gun','slot-key'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.classList.add('empty');el.classList.remove('has-item','active-btn');
    const b=el.querySelector('.badge');if(b)b.remove();
  });

  // Reset HUD text
  const ov=document.getElementById('game-overlay');if(ov)ov.remove();
  document.getElementById('hint-text').textContent='';
  const sm=document.getElementById('status-msg');sm.textContent='等待開始';sm.className='';
  document.getElementById('clock-box').className='grey';
  document.getElementById('clock-phase').textContent='待機中';
  document.getElementById('clock-time').textContent='00:05';
  document.getElementById('zombie-count').textContent='🧟 ×1';

  // Hide shell, show picker
  document.getElementById('shell').style.display='none';
  document.getElementById('mode-picker').style.display='flex';
  document.body.classList.remove('resA','resB','mob-mode');
  document.getElementById('btn-resA').classList.remove('sel');
  document.getElementById('btn-resB').classList.remove('sel');
  document.getElementById('btn-kb').disabled=true;
  document.getElementById('btn-mob').disabled=true;
  _selectedRes=null;
}
</script>
